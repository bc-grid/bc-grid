name: Nightly E2E

on:
  schedule:
    - cron: "47 14 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nightly-e2e:
    name: nightly e2e (Chromium + Firefox + WebKit)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages (workspace deps needed by benchmarks)
        run: bun run build:packages

      - name: Install Playwright browsers
        run: bunx playwright install chromium firefox webkit --with-deps

      - name: Run Playwright tests (full 3-browser × 2-app matrix)
        run: bunx playwright test
