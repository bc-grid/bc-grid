name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: smoke (type-check, lint, test, build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check (project references across all packages)
        run: bun run type-check

      - name: Lint
        run: bun run lint
        continue-on-error: false

      - name: Build all packages
        run: bun run build

      - name: Bundle size gate
        run: bun run bundle-size

      - name: API surface diff
        run: bun run api-surface

      - name: Test
        run: bun run test
        continue-on-error: false

      - name: React DOM tests
        run: bun run test:react-dom
        continue-on-error: false

  e2e:
    name: e2e (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: smoke
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages (workspace deps needed by benchmarks)
        run: bun run build:packages

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Run Playwright tests (Chromium only — full 3-browser matrix runs nightly via e2e-nightly.yml)
        run: bunx playwright test --project=spike-chromium --project=examples-chromium

  smoke-perf:
    name: smoke perf (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: smoke
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build:packages

      - name: Install Chromium
        run: bunx playwright install chromium --with-deps

      - name: Run smoke perf harness
        run: bun run test:smoke-perf

  # Added by repo-foundation task.
