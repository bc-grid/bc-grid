name: Nightly Perf

on:
  schedule:
    - cron: "19 15 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nightly-perf:
    name: nightly perf bars
    # Set repository variable BC_GRID_PERF_RUNNER to a self-hosted runner
    # label for stable hardware. Falls back to GitHub-hosted runners so the
    # workflow remains runnable from a clean repository.
    runs-on: ${{ vars.BC_GRID_PERF_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run --filter './packages/*' build

      - name: Install Chromium
        run: bunx playwright install chromium --with-deps

      - name: Run nightly perf harness
        run: bun run test:perf
